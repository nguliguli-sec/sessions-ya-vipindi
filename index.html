<!DOCTYPE html><html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ratiba Yangu</title>
<style>
body{font-family:Arial;margin:0;background:#f4f6fb;}
.hidden{display:none;}
.container{padding:15px;}
input,select,button{padding:10px;margin:5px 0;width:100%;}
button{cursor:pointer;background:#1e88e5;color:#fff;border:none;border-radius:6px;}
nav{display:flex;justify-content:space-between;align-items:center;background:#0d47a1;color:#fff;padding:10px;flex-wrap:wrap;}
.big{text-transform:uppercase;font-weight:bold;text-align:center;}
.school-wrap{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.school-title{font-weight:bold;text-transform:uppercase;cursor:pointer;}
.school-edit{display:none;max-width:180px;}/* GRID TIMETABLE */ .grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-top:10px; } .cell{ background:#fff; min-height:70px; padding:6px; border-radius:8px; font-size:12px; cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,0.08); } .cell b{display:block;font-size:11px;}

</style>
</head>
<body><!-- AUTH --><div id="auth" class="container">
<h2 class="big">ACCOUNT</h2>
<input id="user" placeholder="Username" />
<input id="pass" type="password" placeholder="Password" />
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div><!-- APP --><div id="app" class="hidden"><nav>
<div class="school-wrap">
<span id="schoolName" class="school-title" onclick="enableEditSchool()">NGULIGULI SECONDARY</span>
<input id="schoolInput" class="school-edit" type="text" onblur="saveSchoolName()" onkeydown="if(event.key==='Enter') saveSchoolName()" />
</div>
<div><button onclick="logout()">Logout</button></div>
</nav><div class="container">
<h3 class="big">RATIBA YANGU</h3><div class="card">
<h4>Selected Period</h4>
<div id="selectedView">Hakuna kipindi</div>
</div><div class="card">
<h4>Weka Ratiba</h4><select id="form">
<option>Form 1</option><option>Form 2</option><option>Form 3</option><option>Form 4</option>
</select><select id="day">
<option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option>
</select><select id="period">
<option>Period 1</option><option>Period 2</option><option>Period 3</option><option>Period 4</option>
</select><input id="subject" placeholder="Subject" />
<input id="teacher" placeholder="Teacher" /><button onclick="saveTimetable()">SAVE / UPDATE</button>

</div><!-- GRID VIEW --><div class="grid" id="grid"></div></div>
</div><script>

let currentUser=null;
const days=["Monday","Tuesday","Wednesday","Thursday","Friday"];
const periods=["Period 1","Period 2","Period 3","Period 4"];

function $(id){return document.getElementById(id);}

/* AUTH */
function register(){let u=$('user').value,p=$('pass').value;if(!u||!p)return;localStorage.setItem('u_'+u,JSON.stringify({user:u,pass:p}));alert('Registered');}
function login(){let u=$('user').value,p=$('pass').value;let d=JSON.parse(localStorage.getItem('u_'+u));if(d&&d.pass===p){currentUser=u;sessionStorage.setItem('active',u);startApp();}else alert('Wrong login');}
window.onload=function(){let a=sessionStorage.getItem('active');if(a){currentUser=a;startApp();}}

function startApp(){
$('auth').classList.add('hidden');
$('app').classList.remove('hidden');
loadSchool();renderGrid();}

function logout(){sessionStorage.clear();location.reload();}

/* SCHOOL */
function loadSchool(){let s=localStorage.getItem(currentUser+'_school')||'NGULIGULI SECONDARY';$('schoolName').innerText=s.toUpperCase();$('schoolInput').value=s;}
function enableEditSchool(){$('schoolName').style.display='none';$('schoolInput').style.display='block';$('schoolInput').focus();}
function saveSchoolName(){let v=$('schoolInput').value.trim();if(!v)return;localStorage.setItem(currentUser+'_school',v);loadSchool();$('schoolName').style.display='block';$('schoolInput').style.display='none';}

/* SAVE PER CELL */
function saveTimetable(){
let key=$('day').value+'_'+$('period').value;
let obj={form:$('form').value,day:$('day').value,period:$('period').value,subject:$('subject').value,teacher:$('teacher').value};
localStorage.setItem(currentUser+'_tt_'+key,JSON.stringify(obj));
renderGrid();showSelected(obj);
}

/* GRID RENDER */
function renderGrid(){
let html='';
for(let p=0;p<periods.length;p++){
for(let d=0;d<days.length;d++){
let key=days[d]+'_'+periods[p];
let data=JSON.parse(localStorage.getItem(currentUser+'_tt_'+key)||'null');
html+=`<div class='cell' onclick="loadCell('${days[d]}','${periods[p]}')">
<b>${days[d]}</b>
${periods[p]}<br>
${data?data.subject+' - '+data.teacher:'Empty'}
</div>`;
}
}
$('grid').innerHTML=html;
}

function loadCell(day,period){
let data=JSON.parse(localStorage.getItem(currentUser+'_tt_'+day+'_'+period)||'null');
$('day').value=day;
$('period').value=period;
if(data){$('subject').value=data.subject;$('teacher').value=data.teacher;}else{$('subject').value='';$('teacher').value='';}
}

function showSelected(a){
$('selectedView').innerHTML=`<b>${a.day}</b> | ${a.period}<br>${a.subject} - ${a.teacher}`;
}

</script></body>
</html>
