<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ratiba ya Vipindi – Nguliguli Secondary</title>

<style>
body{font-family:Arial,sans-serif;padding:0;margin:0;background:#f4f6fb;}

header{
display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;
background:linear-gradient(90deg,#1a73e8,#0b4db8);
color:white;padding:15px 10px;
}

.menu-btn{font-size:28px;cursor:pointer;color:white;margin-right:10px;}

.office{display:none;background:white;padding:20px;margin:10px;border-radius:6px;}

.auth-input{margin:5px 0;padding:8px;width:95%;}
.auth-btn{padding:8px 12px;background:#1a73e8;color:#fff;border:none;margin:5px;}

table{border-collapse:collapse;width:100%;}
th,td{border:1px solid #999;padding:8px;font-size:12px;}
th{color:white;}

.form1 th{background:#1a73e8;}
.form2 th{background:#d93025;}
.form3 th{background:#188038;}
.form4 th{background:#f9ab00;}

.hidden{display:none;}

/* DOT MENU */
.dotMenu{position:relative;display:inline-block;}
.dotContent{
display:none;position:absolute;right:0;background:white;
min-width:150px;box-shadow:0 0 10px rgba(0,0,0,0.2);
z-index:999;border-radius:6px;
}
.dotContent a{display:block;padding:10px;text-decoration:none;color:black;cursor:pointer;}
.dotContent a:hover{background:#eee;}
</style>
</head>

<body>

<header>
<div>
<span class="menu-btn" onclick="openMenu()">☰</span>
<h3>Nguliguli Secondary School</h3>
</div>

<div class="dotMenu">
<span class="menu-btn" onclick="toggleDot()">⋮</span>
<div id="dotBox" class="dotContent">
<a onclick="logout()">Logout</a>
</div>
</div>
</header>

<!-- AUTH -->
<div id="authScreen" class="office" style="display:block;">
<h3>Sign In</h3>
<input id="username" class="auth-input" placeholder="Username">
<input id="password" type="password" class="auth-input" placeholder="Password">
<button class="auth-btn" onclick="signIn()">Login</button>
<button class="auth-btn" onclick="showRegister()">Register</button>
<button class="auth-btn" onclick="continueAsGuest()">Guest</button>
</div>

<!-- REGISTER -->
<div id="registerScreen" class="office">
<h3>Register</h3>
<input id="regUsername" class="auth-input" placeholder="Username">
<input id="regPassword" type="password" class="auth-input" placeholder="Password">
<button class="auth-btn" onclick="registerAccount()">Save</button>
<button class="auth-btn" onclick="backToAuth()">Back</button>
</div>

<!-- APP -->
<div id="appScreen" class="hidden"></div>

<script>

/* ===== DATA ORIGINAL ===== */
const walimu=[
"Denis Maige","Damiani Lushinge","Omari Mniru","Mario Maketa",
"Method Maginga","Samwel Msabila","Mwansiti Mbwana","Agness Tarence",
"Joyce Makoli","Nicholous Godfrey","Petro Benjamin","Kinunda Godfrid","Baraka John"
];

const masomo=[
"Physics","History","Biology","Mathematics","Business Studies","Chemistry",
"English Language","English Literature","Civics","Geography","Kiswahili"
];

const schedule=[
{ siku:"Jumatatu", periods:[
{kipindi:1,muda:"08:00"},{kipindi:2,muda:"08:45"},
{kipindi:3,muda:"09:30"},{kipindi:4,muda:"10:15"},
{kipindi:5,muda:"11:00"},{kipindi:6,muda:"11:45"}
]},
{ siku:"Jumanne", periods:[
{kipindi:1,muda:"08:00"},{kipindi:2,muda:"08:45"},
{kipindi:3,muda:"09:30"},{kipindi:4,muda:"10:15"},
{kipindi:5,muda:"11:00"},{kipindi:6,muda:"11:45"}
]},
{ siku:"Jumatano", periods:[
{kipindi:1,muda:"08:00"},{kipindi:2,muda:"08:45"},
{kipindi:3,muda:"09:30"},{kipindi:4,muda:"10:15"},
{kipindi:5,muda:"11:00"},{kipindi:6,muda:"11:45"}
]},
{ siku:"Alhamisi", periods:[
{kipindi:1,muda:"08:00"},{kipindi:2,muda:"08:45"},
{kipindi:3,muda:"09:30"},{kipindi:4,muda:"10:15"},
{kipindi:5,muda:"11:00"},{kipindi:6,muda:"11:45"}
]},
{ siku:"Ijumaa", periods:[
{kipindi:1,muda:"08:00"},{kipindi:2,muda:"08:45"},
{kipindi:3,muda:"09:30"},{kipindi:4,muda:"10:15"},
{kipindi:5,muda:"11:00"},{kipindi:6,muda:"11:45"}
]}
];

/* ===== STORAGE ===== */
let savedRows = JSON.parse(localStorage.getItem("savedRows") || "{}");

/* ===== AUTH ===== */
function getAcc(){
return JSON.parse(localStorage.getItem("acc")||"{}");
}

function registerAccount(){
let u=regUsername.value,p=regPassword.value;
if(!u||!p)return alert("Fill all");

let acc=getAcc();
if(acc[u])return alert("Exists");

acc[u]={pass:btoa(p)};
localStorage.setItem("acc",JSON.stringify(acc));

alert("Registered");
backToAuth();
}

function signIn(){
let u=username.value,p=password.value;
let acc=getAcc();

if(acc[u] && acc[u].pass===btoa(p)){
localStorage.setItem("user",u);
startApp();
}else alert("Wrong login");
}

function continueAsGuest(){
localStorage.setItem("user","guest");
startApp();
}

function backToAuth(){
authScreen.style.display="block";
registerScreen.style.display="none";
}

/* ===== APP ===== */
function startApp(){
authScreen.style.display="none";
registerScreen.style.display="none";
appScreen.classList.remove("hidden");
generate();
}

/* ===== LOGOUT ===== */
function logout(){
localStorage.removeItem("user");
location.reload();
}

function toggleDot(){
let d=document.getElementById("dotBox");
d.style.display=(d.style.display==="block")?"none":"block";
}

/* ===== AUTO SAVE + HIDE + EDIT ===== */
function autoSave(el){

let row=el.closest("tr");
let subject=row.children[2].querySelector("select").value;
if(!subject) return;

let user=localStorage.getItem("user")||"guest";
let rowId=row.rowIndex+"_"+subject;

savedRows[rowId]={
somo:subject,
mwalimu:row.children[3].querySelector("select").value,
muda:row.children[4].querySelector("input").value,
saved:true
};

localStorage.setItem("savedRows",JSON.stringify(savedRows));

/* hide other rows */
document.querySelectorAll("tr").forEach(r=>{
let s=r.querySelector("select");
if(s && s.value!==subject && s.value!==""){
r.style.display="none";
}
});

/* button → edit */
let btn=row.querySelector("button");
btn.innerText="Edit";
btn.onclick=()=>editRow(row,rowId);

alert("Saved ✔");
}

/* EDIT */
function editRow(row,id){

row.style.display="";

let data=savedRows[id];
if(!data) return;

row.children[2].querySelector("select").value=data.somo;
row.children[3].querySelector("select").value=data.mwalimu;
row.children[4].querySelector("input").value=data.muda;

let btn=row.querySelector("button");
btn.innerText="Save";
btn.onclick=()=>autoSave(btn);
}

/* ===== GENERATE ===== */
function generate(){
let html="";

for(let f=1;f<=4;f++){
html+=`<div class="office" style="display:block;">
<h3>Form ${f}</h3>
<table class="form${f}">
<tr>
<th>Siku</th><th>Kipindi</th><th>Somo</th><th>Mwalimu</th><th>Muda</th><th>Action</th>
</tr>`;

schedule.forEach(day=>{
day.periods.forEach(p=>{
html+=`
<tr>
<td>${day.siku}</td>
<td>${p.kipindi}</td>
<td>${select(masomo)}</td>
<td>${select(walimu)}</td>
<td><input type="time" value="${p.muda}"></td>
<td><button onclick="autoSave(this)">Save</button></td>
</tr>`;
});
});

html+="</table></div>";
}

appScreen.innerHTML=html;
}

/* SELECT */
function select(arr){
return `<select>${arr.map(x=>`<option>${x}</option>`).join("")}</select>`;
}

/* AUTO LOGIN */
if(localStorage.getItem("user")){
startApp();
}

</script>

</body>
</html>
