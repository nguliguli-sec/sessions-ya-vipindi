<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ratiba ya Vipindi – Nguliguli Secondary</title>

<style>
body{font-family:Arial,sans-serif;margin:0;background:#f4f6fb;}

header{
background:linear-gradient(90deg,#1a73e8,#0b4db8);
color:white;padding:15px;text-align:center;
}

.office{display:none;background:white;padding:15px;margin:10px;border-radius:6px;}

.auth-input{margin:5px 0;padding:8px;width:95%;}
.auth-btn{padding:8px 12px;background:#1a73e8;color:#fff;border:none;margin:5px;}

table{border-collapse:collapse;width:100%;}
th,td{border:1px solid #999;padding:8px;font-size:12px;}
th{color:white;}

.form1 th{background:#1a73e8;}
.form2 th{background:#d93025;}
.form3 th{background:#188038;}
.form4 th{background:#f9ab00;}

.uploadBox{
background:#fff;padding:10px;margin:10px;border-radius:6px;
}
</style>
</head>

<body>

<header>
<h2>Nguliguli Secondary School</h2>
<p>Ratiba ya Vipindi</p>
</header>

<!-- LOGIN -->
<div id="authScreen" class="office" style="display:block;">
<h3>Login</h3>
<input id="username" class="auth-input" placeholder="Username">
<input id="password" type="password" class="auth-input" placeholder="Password">
<button class="auth-btn" onclick="signIn()">Login</button>
<button class="auth-btn" onclick="continueAsGuest()">Guest</button>
</div>

<!-- UPLOAD SECTION -->
<div id="uploadBox" class="office">

<div class="uploadBox">
<h3>Upload Scheme of Work (PDF)</h3>
<input type="file" accept="application/pdf" onchange="saveFile(this,'scheme')">
</div>

<div class="uploadBox">
<h3>Upload Lesson Plan (PDF)</h3>
<input type="file" accept="application/pdf" onchange="saveFile(this,'lesson')">
</div>

</div>

<!-- SCHEDULE -->
<div id="scheduleContainer"></div>

<script>

/* ===== USERS ===== */
let users={
"admin":"1234",
"teacher":"1111"
};

/* ===== DATA ===== */
const walimu=[
"Denis Maige","Damiani Lushinge","Omari Mniru","Mario Maketa",
"Method Maginga","Samwel Msabila","Mwansiti Mbwana","Agness Tarence",
"Joyce Makoli","Nicholous Godfrey","Petro Benjamin","Kinunda Godfrid","Baraka John"
];

const masomo=[
"Physics","History","Biology","Mathematics","Business Studies","Chemistry",
"English Language","English Literature","Civics","Geography","Kiswahili"
];

const schedule=[
{ siku:"Jumatatu", periods:[{kipindi:1,muda:"08:00"},{kipindi:2,muda:"08:45"},{kipindi:3,muda:"09:30"},{kipindi:4,muda:"10:15"},{kipindi:5,muda:"11:00"},{kipindi:6,muda:"11:45"}]},
{ siku:"Jumanne", periods:[{kipindi:1,muda:"08:00"},{kipindi:2,muda:"08:45"},{kipindi:3,muda:"09:30"},{kipindi:4,muda:"10:15"},{kipindi:5,muda:"11:00"},{kipindi:6,muda:"11:45"}]},
{ siku:"Jumatano", periods:[{kipindi:1,muda:"08:00"},{kipindi:2,muda:"08:45"},{kipindi:3,muda:"09:30"},{kipindi:4,muda:"10:15"},{kipindi:5,muda:"11:00"},{kipindi:6,muda:"11:45"}]},
{ siku:"Alhamisi", periods:[{kipindi:1,muda:"08:00"},{kipindi:2,muda:"08:45"},{kipindi:3,muda:"09:30"},{kipindi:4,muda:"10:15"},{kipindi:5,muda:"11:00"},{kipindi:6,muda:"11:45"}]},
{ siku:"Ijumaa", periods:[{kipindi:1,muda:"08:00"},{kipindi:2,muda:"08:45"},{kipindi:3,muda:"09:30"},{kipindi:4,muda:"10:15"},{kipindi:5,muda:"11:00"},{kipindi:6,muda:"11:45"}]}
];

/* ===== LOGIN ===== */
function continueAsGuest(){
localStorage.setItem("user","guest");
startApp();
}

function signIn(){
let u=username.value;
let p=password.value;

if(users[u] && users[u]===p){
localStorage.setItem("user",u);
startApp();
}else{
alert("Wrong login");
}
}

/* ===== START APP ===== */
function startApp(){
authScreen.style.display="none";
uploadBox.style.display="block";
generateSchedule();
}

/* ===== UPLOAD PDF ===== */
function saveFile(input,type){
let file=input.files[0];
if(!file) return;

let reader=new FileReader();
reader.onload=function(){
localStorage.setItem(type,reader.result);
alert(type+" uploaded successfully");
};
reader.readAsDataURL(file);
}

/* ===== SCHEDULE ===== */
function generateSchedule(){
let html="";

for(let f=1;f<=4;f++){
html+=`<div class="office" style="display:block">
<h3>Form ${f}</h3>
<table class="form${f}">
<tr>
<th>Siku</th><th>Kipindi</th><th>Somo</th><th>Mwalimu</th><th>Muda</th>
</tr>`;

schedule.forEach(day=>{
day.periods.forEach(p=>{
html+=`
<tr>
<td>${day.siku}</td>
<td>${p.kipindi}</td>
<td>${select(masomo)}</td>
<td>${select(walimu)}</td>
<td><input type="time" value="${p.muda}"></td>
</tr>`;
});
});

html+="</table></div>";
}

scheduleContainer.innerHTML=html;
}

/* dropdown */
function select(arr){
return `<select>${arr.map(x=>`<option>${x}</option>`).join("")}</select>`;
}

/* AUTO LOGIN */
if(localStorage.getItem("user")){
startApp();
}

</script>

</body>
  </html>
