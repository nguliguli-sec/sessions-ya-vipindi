<!DOCTYPE html><html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ratiba Yangu</title>
<style>
body{font-family:Arial;margin:0;background:#f4f6fb;}
.hidden{display:none;}
.container{padding:15px;}
input,select,button{padding:10px;margin:5px 0;width:100%;}
button{cursor:pointer;background:#1e88e5;color:#fff;border:none;border-radius:6px;}
nav{display:flex;justify-content:space-between;align-items:center;background:#0d47a1;color:#fff;padding:10px;flex-wrap:wrap;}
.big{text-transform:uppercase;font-weight:bold;text-align:center;}
.school-title{font-weight:bold;text-transform:uppercase;cursor:pointer;}
.school-input{display:none;padding:5px;}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:10px;} .cell{background:#fff;min-height:80px;padding:6px;border-radius:8px;font-size:12px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.08);} .cell.active{background:#c8f7c5;}

.selected-item{background:#fff;padding:8px;margin:6px 0;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,0.08);font-size:13px;}

</style>
</head>
<body><!-- AUTH --><div id="auth" class="container">
<h2 class="big">ACCOUNT</h2>
<input id="user" placeholder="Username" />
<input id="pass" type="password" placeholder="Password" />
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div><!-- APP --><div id="app" class="hidden"><nav>
<div>
<span id="schoolName" class="school-title" onclick="editSchool()">NGULIGULI SECONDARY</span>
<input id="schoolInput" class="school-input" onblur="saveSchool()" onkeydown="if(event.key==='Enter')saveSchool()" />
</div>
<div><button onclick="logout()">Logout</button></div>
</nav><div class="container">
<h3 class="big">RATIBA YANGU</h3><div class="card">
<h4>Selected Periods</h4>
<div id="selectedList">Hakuna kipindi</div>
</div><div class="card">
<h4>Weka Ratiba</h4>
<select id="form"><option>Form 1</option><option>Form 2</option><option>Form 3</option><option>Form 4</option></select>
<select id="day"><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option></select>
<select id="period"><option>Period 1</option><option>Period 2</option><option>Period 3</option><option>Period 4</option></select>
<input id="time" type="time" />
<input id="subject" placeholder="Subject" />
<input id="teacher" placeholder="Teacher" />
<button onclick="saveTimetable()">SAVE / UPDATE</button>
</div><div class="grid" id="grid"></div>
</div><script>
let currentUser=null;
const days=["Monday","Tuesday","Wednesday","Thursday","Friday"];
const periods=["Period 1","Period 2","Period 3","Period 4"];

function $(id){return document.getElementById(id);}

/* DEVICE LIMIT REGISTRATION */
function register(){
let u=$('user').value,p=$('pass').value;
if(!u||!p)return;
if(localStorage.getItem('device_user')){alert('Device tayari ina account moja');return;}
localStorage.setItem('device_user',u);
localStorage.setItem('u_'+u,JSON.stringify({user:u,pass:p}));
alert('Registered');
}

function login(){
let u=$('user').value,p=$('pass').value;
let d=JSON.parse(localStorage.getItem('u_'+u));
if(d&&d.pass===p){currentUser=u;sessionStorage.setItem('active',u);startApp();}else alert('Wrong login');
}

window.onload=function(){let a=sessionStorage.getItem('active');if(a){currentUser=a;startApp();}}

function startApp(){
$('auth').classList.add('hidden');
$('app').classList.remove('hidden');
renderGrid();renderSelected();loadSchool();}

function logout(){sessionStorage.clear();location.reload();}

/* SAVE */
function saveTimetable(){
let key=$('day').value+'_'+$('period').value;
let obj={
key:key,
form:$('form').value,
day:$('day').value,
period:$('period').value,
time:$('time').value,
subject:$('subject').value,
teacher:$('teacher').value
};
localStorage.setItem(currentUser+'_tt_'+key,JSON.stringify(obj));
addSelected(obj);
renderGrid();playSound();
}

/* SELECTED */
function addSelected(obj){
let list=JSON.parse(localStorage.getItem(currentUser+'_selected')||'[]');
list.push(obj);
localStorage.setItem(currentUser+'_selected',JSON.stringify(list));
renderSelected();
}

function renderSelected(){
let list=JSON.parse(localStorage.getItem(currentUser+'_selected')||'[]');
if(list.length===0){$('selectedList').innerHTML='Hakuna kipindi';return;}
let html='';
list.forEach((a,i)=>{
html+=`<div class='selected-item'>
<b>${a.form} | ${a.day} | ${a.period}</b><br>
${a.subject} - ${a.teacher} (${a.time||'no time'})<br>
<button onclick="editSelected(${i})">Edit</button>
<button onclick="deleteSelected(${i})">Delete</button>
</div>`;
});
$('selectedList').innerHTML=html;
}

function editSelected(i){
let list=JSON.parse(localStorage.getItem(currentUser+'_selected'));
let a=list[i];
$('form').value=a.form;
$('day').value=a.day;
$('period').value=a.period;
$('time').value=a.time;
$('subject').value=a.subject;
$('teacher').value=a.teacher;
}

/* DELETE WITH CONFIRM + SYNC GRID */
function deleteSelected(i){
if(!confirm('Una uhakika unataka kufuta hii ratiba?'))return;
let list=JSON.parse(localStorage.getItem(currentUser+'_selected'));
let item=list[i];
if(item&&item.key){
localStorage.removeItem(currentUser+'_tt_'+item.key);
}
list.splice(i,1);
localStorage.setItem(currentUser+'_selected',JSON.stringify(list));
renderSelected();
renderGrid();
}

/* GRID */
function renderGrid(){
let html='';
for(let p=0;p<periods.length;p++){
for(let d=0;d<days.length;d++){
let key=days[d]+'_'+periods[p];
let data=JSON.parse(localStorage.getItem(currentUser+'_tt_'+key)||'null');
html+=`<div class='cell ${data?'active':''}' onclick="loadCell('${days[d]}','${periods[p]}')">
<b>${days[d]}</b><br>${periods[p]}<br>${data?data.subject+' - '+data.teacher:'Empty'}</div>`;
}
}
$('grid').innerHTML=html;
}

function loadCell(day,period){
let data=JSON.parse(localStorage.getItem(currentUser+'_tt_'+day+'_'+period)||'null');
$('day').value=day;$('period').value=period;
if(data){$('subject').value=data.subject;$('teacher').value=data.teacher;$('time').value=data.time;}else{$('subject').value='';$('teacher').value='';$('time').value='';}
}

/* SCHOOL */
function editSchool(){
$('schoolInput').style.display='block';
$('schoolInput').value=$('schoolName').innerText;
}
function saveSchool(){
let v=$('schoolInput').value.toUpperCase();
$('schoolName').innerText=v;
$('schoolInput').style.display='none';
localStorage.setItem(currentUser+'_school',v);
}
function loadSchool(){
let sc=localStorage.getItem(currentUser+'_school');
if(sc)$('schoolName').innerText=sc;
}

function playSound(){try{let a=new Audio('notify.mp3');a.volume=1;a.play();}catch(e){}}

</script></body>
</html>
