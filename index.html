<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ratiba ya Vipindi – Nguliguli Secondary</title>

<style>
body{font-family:Arial,sans-serif;margin:0;background:#f4f6fb;}

header{
display:flex;justify-content:space-between;align-items:center;
background:linear-gradient(90deg,#1a73e8,#0b4db8);
color:white;padding:15px;
}

.menu-btn{font-size:26px;cursor:pointer;}

.office{background:white;padding:15px;margin:10px;border-radius:8px;}

.auth-input{margin:5px 0;padding:8px;width:95%;}
.auth-btn{padding:8px 12px;background:#1a73e8;color:#fff;border:none;margin:5px;}

table{border-collapse:collapse;width:100%;}
th,td{border:1px solid #999;padding:6px;font-size:12px;}
th{color:white;}

.form1 th{background:#1a73e8;}
.form2 th{background:#d93025;}
.form3 th{background:#188038;}
.form4 th{background:#f9ab00;}

.hidden{display:none;}
</style>
</head>

<body>

<header>
<h3>Nguliguli Secondary School</h3>
</header>

<!-- LOGIN -->
<div id="authScreen" class="office">
<h3>Sign In</h3>
<input id="username" class="auth-input" placeholder="Username">
<input id="password" type="password" class="auth-input" placeholder="Password">
<button class="auth-btn" onclick="signIn()">Login</button>
<button class="auth-btn" onclick="continueAsGuest()">Guest</button>
</div>

<!-- APP -->
<div id="appScreen" class="hidden"></div>

<script>

/* DATA */
const walimu=[
"Denis Maige","Damiani Lushinge","Omari Mniru","Mario Maketa",
"Method Maginga","Samwel Msabila","Mwansiti Mbwana","Agness Tarence",
"Joyce Makoli","Nicholous Godfrey","Petro Benjamin","Kinunda Godfrid","Baraka John"
];

const masomo=[
"Physics","History","Biology","Mathematics","Business","Chemistry",
"English","Civics","Geography","Kiswahili"
];

const schedule=[
{ siku:"Jumatatu", periods:[{kipindi:1,muda:"08:00"},{kipindi:2,muda:"08:45"}]},
{ siku:"Jumanne", periods:[{kipindi:1,muda:"08:00"},{kipindi:2,muda:"08:45"}]},
{ siku:"Jumatano", periods:[{kipindi:1,muda:"08:00"},{kipindi:2,muda:"08:45"}]},
{ siku:"Alhamisi", periods:[{kipindi:1,muda:"08:00"},{kipindi:2,muda:"08:45"}]},
{ siku:"Ijumaa", periods:[{kipindi:1,muda:"08:00"},{kipindi:2,muda:"08:45"}]}
];

/* STORAGE */
let savedRows = JSON.parse(localStorage.getItem("savedRows")||"{}");

/* AUTH */
function signIn(){
let u=username.value,p=password.value;
if(u && p){
localStorage.setItem("user",u);
startApp();
}else alert("Jaza login");
}

function continueAsGuest(){
localStorage.setItem("user","guest");
startApp();
}

/* START */
function startApp(){
authScreen.classList.add("hidden");
appScreen.classList.remove("hidden");
generate();
}

/* SAVE */
function autoSave(btn){
let row = btn.closest("tr");

let id = row.children[0].innerText+"_"+row.children[1].innerText;

savedRows[id]={
somo: row.children[2].querySelector("select").value,
mwalimu: row.children[3].querySelector("select").value,
muda: row.children[4].querySelector("input").value
};

localStorage.setItem("savedRows",JSON.stringify(savedRows));

btn.innerText="Edit";
btn.onclick=()=>editRow(row,id);

alert("Saved ✔");
}

/* EDIT */
function editRow(row,id){
let data=savedRows[id];
if(!data) return;

row.children[2].querySelector("select").value=data.somo;
row.children[3].querySelector("select").value=data.mwalimu;
row.children[4].querySelector("input").value=data.muda;

let btn=row.querySelector("button");
btn.innerText="Save";
btn.onclick=()=>autoSave(btn);
}

/* GENERATE */
function generate(){
let html="";

for(let f=1; f<=4; f++){
html+=`<div class="office">
<h3>Form ${f}</h3>
<table class="form${f}">
<tr>
<th>Siku</th><th>Kipindi</th><th>Somo</th><th>Mwalimu</th><th>Muda</th><th>Action</th>
</tr>`;

schedule.forEach(day=>{
day.periods.forEach(p=>{
html+=`
<tr>
<td>${day.siku}</td>
<td>${p.kipindi}</td>
<td>${select(masomo)}</td>
<td>${select(walimu)}</td>
<td><input type="time" value="${p.muda}"></td>
<td><button onclick="autoSave(this)">Save</button></td>
</tr>`;
});
});

html+=`</table></div>`;
}

appScreen.innerHTML=html;
}

/* SELECT */
function select(arr){
return `<select>${arr.map(x=>`<option>${x}</option>`).join("")}</select>`;
}

/* AUTO LOGIN */
if(localStorage.getItem("user")){
startApp();
}

</script>

</body>
</html>
