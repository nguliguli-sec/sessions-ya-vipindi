<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ratiba ya Vipindi – Nguliguli Secondary</title>

<style>
body{font-family:Arial,sans-serif;margin:0;background:#f4f6fb;}

header{
background:linear-gradient(90deg,#1a73e8,#0b4db8);
color:white;
text-align:center;
padding:18px;
font-size:22px;
font-weight:bold;
}

.office{background:white;padding:15px;margin:10px;border-radius:8px;}

.auth-input{margin:5px 0;padding:8px;width:95%;}
.auth-btn{padding:8px 12px;background:#1a73e8;color:#fff;border:none;margin:5px;}

table{border-collapse:collapse;width:100%;}
th,td{border:1px solid #999;padding:6px;font-size:12px;}
th{color:white;}

.form1 th{background:#1a73e8;}
.form2 th{background:#d93025;}
.form3 th{background:#188038;}
.form4 th{background:#f9ab00;}

.hidden{display:none;}
</style>
</head>

<body>

<header>RATIBA YANGU</header>

<!-- AUTH -->
<div id="authScreen" class="office">
<h3>Login / Register</h3>

<input id="username" class="auth-input" placeholder="Username">
<input id="password" type="password" class="auth-input" placeholder="Password">

<button class="auth-btn" onclick="register()">Register</button>
<button class="auth-btn" onclick="login()">Login</button>
<button class="auth-btn" onclick="guest()">Guest</button>
</div>

<!-- APP -->
<div id="appScreen" class="hidden"></div>

<script>

/* DATA */
const walimu=[
"Denis Maige","Damiani Lushinge","Omari Mniru","Mario Maketa",
"Method Maginga","Samwel Msabila","Mwansiti Mbwana","Agness Tarence",
"Joyce Makoli","Nicholous Godfrey","Petro Benjamin","Kinunda Godfrid","Baraka John"
];

const masomo=[
"Physics","History","Biology","Mathematics","Business","Chemistry",
"English","Civics","Geography","Kiswahili"
];

const schedule=[
{ siku:"Jumatatu"},
{ siku:"Jumanne"},
{ siku:"Jumatano"},
{ siku:"Alhamisi"},
{ siku:"Ijumaa"}
];

/* CURRENT USER */
let currentUser = null;

/* REGISTER */
function register(){
let u=username.value,p=password.value;
if(!u||!p) return alert("Jaza zote");

let users = JSON.parse(localStorage.getItem("users")||"{}");

if(users[u]) return alert("Account ipo tayari");

users[u]={pass:btoa(p)};
localStorage.setItem("users",JSON.stringify(users));

alert("Registered ✔ sasa login");
}

/* LOGIN */
function login(){
let u=username.value,p=password.value;

let users = JSON.parse(localStorage.getItem("users")||"{}");

if(users[u] && users[u].pass===btoa(p)){
currentUser=u;
localStorage.setItem("currentUser",u);
startApp();
}else alert("Login imekataa");
}

/* GUEST */
function guest(){
currentUser="guest";
localStorage.setItem("currentUser","guest");
startApp();
}

/* START */
function startApp(){
authScreen.classList.add("hidden");
appScreen.classList.remove("hidden");
generate();
}

/* SAVE PER USER */
function getKey(){
return "schedule_"+currentUser;
}

function loadData(){
return JSON.parse(localStorage.getItem(getKey())||"{}");
}

function saveData(data){
localStorage.setItem(getKey(),JSON.stringify(data));
}

/* AUTO SAVE */
function autoSave(btn){
let row = btn.closest("tr");
let table = btn.closest("table");

let id = table.dataset.form+"_"+row.dataset.day+"_"+row.dataset.period;

let data = loadData();

data[id]={
somo: row.children[2].querySelector("select").value,
mwalimu: row.children[3].querySelector("select").value,
muda: row.children[4].querySelector("input").value
};

saveData(data);

btn.innerText="Edit";
btn.onclick=()=>editRow(row,id,btn);

alert("Saved ✔");
}

/* EDIT */
function editRow(row,id,btn){
let data = loadData()[id];
if(!data) return;

row.children[2].querySelector("select").value=data.somo;
row.children[3].querySelector("select").value=data.mwalimu;
row.children[4].querySelector("input").value=data.muda;

btn.innerText="Save";
btn.onclick=()=>autoSave(btn);
}

/* SELECT */
function select(arr){
return `<select>${arr.map(x=>`<option>${x}</option>`).join("")}</select>`;
}

/* GENERATE */
function generate(){

let data = loadData();

let html="";

for(let f=1; f<=4; f++){
html+=`
<div class="office">
<h3>Form ${f}</h3>
<table class="form${f}" data-form="form${f}">
<tr>
<th>Siku</th>
<th>Kipindi</th>
<th>Somo</th>
<th>Mwalimu</th>
<th>Muda</th>
<th>Action</th>
</tr>`;

schedule.forEach(day=>{
for(let p=1; p<=4; p++){

let id="form"+f+"_"+day.siku+"_"+p;
let d=data[id]||{};

html+=`
<tr data-day="${day.siku}" data-period="${p}">
<td>${day.siku}</td>
<td>${p}</td>
<td>${select(masomo)}</td>
<td>${select(walimu)}</td>
<td><input type="time" value="${d.muda || "08:00"}"></td>
<td><button onclick="autoSave(this)">Save</button></td>
</tr>`;
}
});

html+=`</table></div>`;
}

appScreen.innerHTML=html;
}

/* AUTO LOGIN */
if(localStorage.getItem("currentUser")){
currentUser = localStorage.getItem("currentUser");
startApp();
}

</script>

</body>
</html>
