<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nguliguli Secondary System</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6fb;}

header{
background:#1a73e8;color:white;padding:15px;text-align:center;
}

.card{background:white;margin:10px;padding:10px;border-radius:6px;}

input,button,select{
padding:8px;margin:5px;width:95%;
}

button{
background:#1a73e8;color:white;border:none;cursor:pointer;
}

table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #999;padding:6px;font-size:12px;}
th{background:#1a73e8;color:white;}

.hidden{display:none;}
</style>
</head>

<body>

<header>
<h2>Nguliguli Secondary School</h2>
<p>Smart School System</p>
</header>

<!-- AUTH -->
<div id="auth" class="card">
<h3>Login / Register</h3>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<!-- PANEL INFO -->
<div id="panelInfo" class="card hidden">
<h3>Panel: <span id="roleText"></span></h3>
<h4>User: <span id="me"></span></h4>
<button onclick="logout()">Logout</button>
</div>

<!-- UPLOAD -->
<div id="uploads" class="card hidden">
<h3>Scheme of Work (PDF)</h3>
<input type="file" accept="application/pdf" onchange="uploadPDF(this,'scheme')">

<h3>Lesson Plan (PDF)</h3>
<input type="file" accept="application/pdf" onchange="uploadPDF(this,'lesson')">
</div>

<!-- SCHEDULE -->
<div id="schedule"></div>

<script>

/* ===== DATA ===== */
const walimu=[
"Denis Maige","Damiani Lushinge","Omari Mniru","Mario Maketa",
"Method Maginga","Samwel Msabila","Mwansiti Mbwana","Agness Tarence",
"Joyce Makoli","Nicholous Godfrey","Petro Benjamin","Kinunda Godfrid","Baraka John"
];

const masomo=[
"Physics","History","Biology","Mathematics","Business Studies","Chemistry",
"English","Civics","Geography","Kiswahili"
];

/* FORM 1 - 4 */
const baseSchedule=[
{day:"Jumatatu",time:["08:00","08:45","09:30"]},
{day:"Jumanne",time:["08:00","08:45","09:30"]},
{day:"Jumatano",time:["08:00","08:45","09:30"]},
{day:"Alhamisi",time:["08:00","08:45","09:30"]},
{day:"Ijumaa",time:["08:00","08:45","09:30"]}
];

/* ===== USERS ===== */
function getUsers(){
return JSON.parse(localStorage.getItem("users")||"{}");
}
function saveUsers(u){
localStorage.setItem("users",JSON.stringify(u));
}

let currentUser=null;
let role=null;

/* ===== REGISTER ===== */
function register(){
let u=user.value,p=pass.value;
if(!u||!p)return alert("Fill all");

let users=getUsers();
if(users[u])return alert("User exists");

users[u]={pass:p,role:"student"};
saveUsers(users);

alert("Registered as student");
}

/* ===== LOGIN ===== */
function login(){
let u=user.value,p=pass.value;
let users=getUsers();

if(users[u] && users[u].pass===p){

currentUser=u;
role=users[u].role;

localStorage.setItem("currentUser",u);
localStorage.setItem("role",role);

start();

}else alert("Wrong login");
}

/* ===== START ===== */
function start(){

auth.classList.add("hidden");
panelInfo.classList.remove("hidden");
uploads.classList.remove("hidden");

roleText.innerText=role.toUpperCase();
me.innerText=currentUser;

loadSchedule();
}

/* ===== LOGOUT ===== */
function logout(){
localStorage.clear();
location.reload();
}

/* ===== PDF UPLOAD ===== */
function uploadPDF(input,type){
let file=input.files[0];
if(!file)return;

let reader=new FileReader();
reader.onload=function(){
localStorage.setItem(type+"_"+currentUser,reader.result);
alert(type+" uploaded");
};
reader.readAsDataURL(file);
}

/* ===== SAVE ROW ===== */
function saveRow(btn){

if(role==="student"){
alert("No permission");
return;
}

let row=btn.closest("tr");

let data={
somo:row.children[2].querySelector("select").value,
mwalimu:row.children[3].querySelector("select").value,
muda:row.children[4].querySelector("input").value
};

let key="schedule_"+currentUser;
let all=JSON.parse(localStorage.getItem(key)||"[]");

all.push(data);
localStorage.setItem(key,JSON.stringify(all));

alert("Saved");
}

/* ===== LOAD SCHEDULE ===== */
function loadSchedule(){

let html="";

for(let f=1;f<=4;f++){

html+=`
<div class="card">
<h3>Form ${f}</h3>
<table>
<tr>
<th>Siku</th>
<th>Kipindi</th>
<th>Somo</th>
<th>Mwalimu</th>
<th>Muda</th>
<th>Save</th>
</tr>`;

baseSchedule.forEach(d=>{
d.time.forEach((t,i)=>{

html+=`
<tr>
<td>${d.day}</td>
<td>${i+1}</td>
<td>${select(masomo)}</td>
<td>${select(walimu)}</td>
<td><input type="time" value="${t}"></td>
<td>
<button onclick="saveRow(this)" ${role==="student"?"disabled":""}>
Save
</button>
</td>
</tr>`;

});
});

html+=`</table></div>`;
}

schedule.innerHTML=html;
}

/* ===== SELECT ===== */
function select(arr){
return `<select>${arr.map(x=>`<option>${x}</option>`).join("")}</select>`;
}

/* ===== AUTO LOGIN ===== */
let u=localStorage.getItem("currentUser");
let r=localStorage.getItem("role");

if(u){
currentUser=u;
role=r;
start();
}

</script>

</body>
</html>
