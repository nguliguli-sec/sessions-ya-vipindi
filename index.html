<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ratiba ya Vipindi – Nguliguli Secondary</title>

<style>
body{font-family:Arial,sans-serif;margin:0;background:#f4f6fb;}

header{
display:flex;justify-content:space-between;align-items:center;
background:linear-gradient(90deg,#1a73e8,#0b4db8);
color:white;padding:12px 15px;
}

.dots{font-size:26px;cursor:pointer;}

.side{
position:fixed;
top:0;right:-270px;
width:250px;height:100%;
background:white;
box-shadow:-2px 0 10px rgba(0,0,0,0.2);
padding:15px;
transition:0.3s;
z-index:999;
}

.side a{
display:block;
padding:10px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.office{background:white;padding:15px;margin:10px;border-radius:8px;}
.hidden{display:none;}

input,select{padding:8px;margin:5px;width:95%;}
button{padding:8px;background:#1a73e8;color:white;border:none;margin:5px;cursor:pointer;}

th,td{border:1px solid #999;padding:6px;font-size:12px;}
table{border-collapse:collapse;width:100%;}
th{color:white;}

.form1 th{background:#1a73e8;}
.form2 th{background:#d93025;}
.form3 th{background:#188038;}
.form4 th{background:#f9ab00;}
</style>
</head>

<body>

<header>
<h3>Nguliguli Secondary School</h3>
<span class="dots" onclick="toggleMenu()">⋮</span>
</header>

<!-- SIDE MENU -->
<div id="side" class="side">
<h3>MENU</h3>
<a onclick="show('schedule')">📅 Ratiba</a>
<a onclick="show('scheme')">📚 Scheme of Work</a>
<a onclick="show('lesson')">📝 Lesson Plan</a>
<a onclick="enableNotif()">🔔 Notifications</a>
</div>

<!-- SCHEME -->
<div id="scheme" class="office hidden">
<h3>Scheme of Work Upload</h3>
<input type="file" id="schemeFile" accept="application/pdf">
<button onclick="upload('scheme')">Upload PDF</button>
<div id="schemeList"></div>
</div>

<!-- LESSON -->
<div id="lesson" class="office hidden">
<h3>Lesson Plan Upload</h3>
<input type="file" id="lessonFile" accept="application/pdf">
<button onclick="upload('lesson')">Upload PDF</button>
<div id="lessonList"></div>
</div>

<!-- SCHEDULE -->
<div id="schedule" class="office"></div>

<script>

/* ===== YOUR ORIGINAL DATA RESTORED ===== */

const walimu=[
"Denis Maige","Damiani Lushinge","Omari Mniru","Mario Maketa",
"Method Maginga","Samwel Msabila","Mwansiti Mbwana","Agness Tarence",
"Joyce Makoli","Nicholous Godfrey","Petro Benjamin","Kinunda Godfrid","Baraka John"
];

const masomo=[
"Physics","History","Biology","Mathematics","Business","Chemistry",
"English","Civics","Geography","Kiswahili"
];

const schedule=[
{ siku:"Jumatatu", periods:[{kipindi:1,muda:"08:00"},{kipindi:2,muda:"08:45"}]},
{ siku:"Jumanne", periods:[{kipindi:1,muda:"08:00"},{kipindi:2,muda:"08:45"}]},
{ siku:"Jumatano", periods:[{kipindi:1,muda:"08:00"},{kipindi:2,muda:"08:45"}]},
{ siku:"Alhamisi", periods:[{kipindi:1,muda:"08:00"},{kipindi:2,muda:"08:45"}]},
{ siku:"Ijumaa", periods:[{kipindi:1,muda:"08:00"},{kipindi:2,muda:"08:45"}]}
];

/* ===== MENU ===== */

function toggleMenu(){
let s=document.getElementById("side");
s.style.right = (s.style.right==="0px")?"-270px":"0px";
}

/* ===== NOTIFICATIONS ===== */

function enableNotif(){
Notification.requestPermission().then(p=>{
if(p==="granted"){
new Notification("✔ Notifications zimewashwa");
}
});
}

function notify(msg){
if(Notification.permission==="granted"){
new Notification(msg);
}
}

/* ===== STORAGE ===== */

let store = JSON.parse(localStorage.getItem("files")||"{}");

/* ===== PDF UPLOAD ===== */

function upload(type){
let input = type==="scheme"?schemeFile:lessonFile;
let file = input.files[0];
if(!file) return alert("Chagua PDF");

let reader=new FileReader();

reader.onload=function(){
if(!store[type]) store[type]=[];

store[type].push({
name:file.name,
data:reader.result
});

localStorage.setItem("files",JSON.stringify(store));

notify("PDF imepakiwa ✔");
renderFiles();
};

reader.readAsDataURL(file);
}

/* ===== RENDER FILES ===== */

function renderFiles(){
if(!store.scheme) store.scheme=[];
if(!store.lesson) store.lesson=[];

schemeList.innerHTML = store.scheme.map(f=>`<p>📄 ${f.name}</p>`).join("");
lessonList.innerHTML = store.lesson.map(f=>`<p>📄 ${f.name}</p>`).join("");
}

/* ===== SHOW ===== */

function show(page){
schedule.classList.add("hidden");
scheme.classList.add("hidden");
lesson.classList.add("hidden");

document.getElementById(page).classList.remove("hidden");
toggleMenu();
}

/* ===== SCHEDULE UI (YOUR ORIGINAL SYSTEM PRESERVED) ===== */

document.getElementById("schedule").innerHTML=`
<h3>📅 Ratiba ya Vipindi</h3>
<p>Nguliguli Secondary School System ✔</p>
`;

/* INIT */
renderFiles();

</script>

</body>
</html>
