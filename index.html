<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nguliguli Level 3 System</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6fb;}

header{
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(90deg,#1a73e8,#0b4db8);
color:white;
padding:12px 15px;
}

.dots{font-size:26px;cursor:pointer;}

.side{
position:fixed;
top:0;right:-280px;
width:250px;height:100%;
background:white;
box-shadow:-2px 0 10px rgba(0,0,0,0.2);
padding:15px;
transition:0.3s;
z-index:999;
}

.side a{
display:block;
padding:10px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.office{background:white;margin:10px;padding:15px;border-radius:8px;}
.hidden{display:none;}

input,select,button{
padding:8px;
margin:5px;
width:95%;
}

button{
background:#1a73e8;
color:white;
border:none;
cursor:pointer;
}

table{border-collapse:collapse;width:100%;}
th,td{border:1px solid #999;padding:6px;font-size:12px;}
th{color:white;}

.form1 th{background:#1a73e8;}
.form2 th{background:#d93025;}
.form3 th{background:#188038;}
.form4 th{background:#f9ab00;}
</style>
</head>

<body>

<header>
<h3>NGULIGULI LEVEL 3</h3>
<span class="dots" onclick="toggleMenu()">⋮</span>
</header>

<!-- MENU -->
<div id="side" class="side">
<h3>MENU</h3>

<a onclick="show('schedule')">📅 Ratiba</a>
<a onclick="show('scheme')">📚 Scheme of Work</a>
<a onclick="show('lesson')">📝 Lesson Plan</a>
<a onclick="enableNotif()">🔔 Enable Notifications</a>
<a onclick="logout()">🚪 Logout</a>
</div>

<!-- LOGIN -->
<div id="loginBox" class="office">
<h3>Login</h3>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="guest()">Guest</button>
</div>

<!-- SCHEME -->
<div id="scheme" class="office hidden">
<h3>Scheme of Work</h3>
<input type="file" id="schemeFile" accept="application/pdf">
<button onclick="upload('scheme')">Upload</button>
<div id="schemeList"></div>
</div>

<!-- LESSON -->
<div id="lesson" class="office hidden">
<h3>Lesson Plan</h3>
<input type="file" id="lessonFile" accept="application/pdf">
<button onclick="upload('lesson')">Upload</button>
<div id="lessonList"></div>
</div>

<!-- SCHEDULE -->
<div id="schedule" class="office hidden"></div>

<script>

/* ===== USERS ===== */
let currentUser=null;

function login(){
let u=user.value,p=pass.value;
if(!u||!p) return alert("Jaza");

let users=JSON.parse(localStorage.getItem("users")||"{}");

if(!users[u]){
users[u]={pass:btoa(p),role:"teacher"};
localStorage.setItem("users",JSON.stringify(users));
}

if(users[u].pass===btoa(p)){
currentUser=u;
start();
}else alert("Login failed");
}

function guest(){
currentUser="guest";
start();
}

function logout(){
localStorage.removeItem("currentUser");
location.reload();
}

/* ===== START ===== */
function start(){
loginBox.classList.add("hidden");
schedule.classList.remove("hidden");
generate();
renderFiles();
}

/* ===== MENU ===== */
function toggleMenu(){
let s=document.getElementById("side");
s.style.right = (s.style.right==="0px")?"-280px":"0px";
}

/* ===== NOTIFICATIONS ===== */
function enableNotif(){
Notification.requestPermission().then(p=>{
if(p==="granted") new Notification("Notifications ON ✔");
});
}

function notify(msg){
if(Notification.permission==="granted"){
new Notification(msg);
}
}

/* ===== DATA ===== */
const walimu=[
"Denis Maige","Damiani Lushinge","Omari Mniru","Mario Maketa",
"Method Maginga","Samwel Msabila","Mwansiti Mbwana","Agness Tarence",
"Joyce Makoli","Nicholous Godfrey","Petro Benjamin","Kinunda Godfrid","Baraka John"
];

const masomo=[
"Physics","History","Biology","Mathematics","Business","Chemistry",
"English","Civics","Geography","Kiswahili"
];

const scheduleData=[
"Jumatatu","Jumanne","Jumatano","Alhamisi","Ijumaa"
];

/* ===== STORAGE ===== */
function key(){return "nguluguli_"+currentUser;}
function load(){return JSON.parse(localStorage.getItem(key())||"{}");}
function save(d){localStorage.setItem(key(),JSON.stringify(d));}

/* ===== TIMETABLE GENERATOR ===== */
function generate(){
let data=load();
let html="";

scheduleData.forEach(day=>{
html+=`<h3>📅 ${day}</h3>
<table>
<tr>
<th>Kipindi</th><th>Somo</th><th>Mwalimu</th><th>Muda</th><th>Action</th>
</tr>`;

for(let i=1;i<=4;i++){

let id=day+"_"+i;
let d=data[id]||{};

html+=`
<tr>
<td>${i}</td>

<td><select id="s_${id}">
${masomo.map(m=>`<option ${d.somo==m?'selected':''}>${m}</option>`).join("")}
</select></td>

<td><select id="t_${id}">
${walimu.map(w=>`<option ${d.mwalimu==w?'selected':''}>${w}</option>`).join("")}
</select></td>

<td><input type="time" id="m_${id}" value="${d.muda||''}"></td>

<td><button onclick="saveRow('${id}')">Save</button></td>
</tr>`;
}

html+=`</table><br>`;
});

schedule.innerHTML=html;
}

/* ===== SAVE ROW ===== */
function saveRow(id){
let data=load();

data[id]={
somo:document.getElementById("s_"+id).value,
mwalimu:document.getElementById("t_"+id).value,
muda:document.getElementById("m_"+id).value
};

save(data);
notify("Saved ✔");
}

/* ===== PDF ===== */
let files=JSON.parse(localStorage.getItem("files")||"{}");

function upload(type){
let input=type==="scheme"?schemeFile:lessonFile;
let file=input.files[0];
if(!file) return alert("Chagua PDF");

let r=new FileReader();

r.onload=function(){
if(!files[type]) files[type]=[];

files[type].push({name:file.name,data:r.result});

localStorage.setItem("files",JSON.stringify(files));

notify("PDF uploaded ✔");
renderFiles();
};

r.readAsDataURL(file);
}

function renderFiles(){
if(!files.scheme) files.scheme=[];
if(!files.lesson) files.lesson=[];

schemeList.innerHTML=files.scheme.map(f=>
`<p>📄 ${f.name}</p>`
).join("");

lessonList.innerHTML=files.lesson.map(f=>
`<p>📄 ${f.name}</p>`
).join("");
}

/* AUTO LOGIN */
if(localStorage.getItem("currentUser")){
currentUser=localStorage.getItem("currentUser");
start();
}

</script>

</body>
</html>
