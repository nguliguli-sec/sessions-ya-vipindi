<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nguliguli Secondary School</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6fb;}

header{
display:flex;justify-content:space-between;align-items:center;
background:linear-gradient(90deg,#1a73e8,#0b4db8);
color:white;padding:15px;
}

.office{background:white;margin:10px;padding:15px;border-radius:8px;}

table{border-collapse:collapse;width:100%;}
th,td{border:1px solid #999;padding:6px;font-size:12px;}
th{background:#1a73e8;color:white;}

.hidden{display:none;}

.badge{
background:#eee;
padding:6px 10px;
border-radius:20px;
display:inline-block;
margin-bottom:10px;
}

button{padding:6px 10px;margin:3px;background:#1a73e8;color:white;border:none;cursor:pointer;}

.auth{background:white;padding:15px;margin:10px;border-radius:8px;}
</style>
</head>

<body>

<header>
<h3>Nguliguli Secondary School</h3>
<button onclick="logout()">Logout</button>
</header>

<div id="auth" class="auth">
<h3>Login</h3>
<input id="username" placeholder="Username"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<button onclick="guest()">Guest</button>
</div>

<div id="app" class="hidden"></div>

<script>

/* DAYS + PERIODS */
const days=["Jumatatu","Jumanne","Jumatano","Alhamisi","Ijumaa"];
const periods=[1,2,3,4];

/* WALIMU */
const walimu=[
"Denis Maige","Damiani Lushinge","Omari Mniru","Mario Maketa",
"Method Maginga","Samwel Msabila","Mwansiti Mbwana","Agness Tarence",
"Joyce Makoli","Nicholous Godfrey","Petro Benjamin","Kinunda Godfrid","Baraka John"
];

/* MASOMO */
const masomo=[
"Physics","History","Biology","Mathematics","Business","Chemistry",
"English","Civics","Geography","Kiswahili"
];

const time=["08:00","08:45","09:30","10:15"];

/* USER SYSTEM */
let currentUser=null;
let saved={};

function loadData(){
return JSON.parse(localStorage.getItem("timetable_"+currentUser)||"{}");
}

function saveData(){
localStorage.setItem("timetable_"+currentUser,JSON.stringify(saved));
}

/* LOGIN */
function login(){
if(!username.value||!password.value) return alert("Jaza login");

currentUser=username.value;
saved=loadData();

localStorage.setItem("user",currentUser);
start();
}

function guest(){
currentUser="guest";
saved=loadData();
localStorage.setItem("user","guest");
start();
}

function logout(){
localStorage.removeItem("user");
location.reload();
}

function start(){
auth.classList.add("hidden");
app.classList.remove("hidden");
render();
}

/* SAVE → HIDE OTHER ROWS SAME DAY */
function saveRow(id,row){

saved[id]={
somo:row.querySelector(".somo").value,
mwalimu:row.querySelector(".mwalimu").value,
muda:row.querySelector(".muda").value,
selected:true
};

saveData();

let day=id.split("_")[0];

document.querySelectorAll(`tr[data-id^="${day}_"]`).forEach(r=>{
if(r.dataset.id!==id){
r.classList.add("hidden");
}
});
}

/* EDIT */
function editRow(id,row){
row.classList.remove("hidden");

if(saved[id]){
row.querySelector(".somo").value=saved[id].somo;
row.querySelector(".mwalimu").value=saved[id].mwalimu;
row.querySelector(".muda").value=saved[id].muda;
}
}

/* SELECT */
function select(arr,cls){
return `<select class="${cls}">
${arr.map(x=>`<option>${x}</option>`).join("")}
</select>`;
}

/* RENDER */
function render(){

let html="";

days.forEach(day=>{

html+=`
<div class="office">
<div class="badge">📅 ${day} (User: ${currentUser})</div>

<table>
<tr>
<th>Kipindi</th><th>Somo</th><th>Mwalimu</th><th>Muda</th><th>Action</th>
</tr>`;

periods.forEach((p,i)=>{

let id=day+"_"+p;
let isHidden=saved[id] && !saved[id].selected;

html+=`
<tr data-id="${id}" class="${isHidden?'hidden':''}">
<td>${p}</td>
<td>${select(masomo,"somo")}</td>
<td>${select(walimu,"mwalimu")}</td>
<td><input class="muda" type="time" value="${time[i]}"></td>
<td>
<button onclick="saveRow('${id}',this.closest('tr'))">Save</button>
<button onclick="editRow('${id}',this.closest('tr'))">Edit</button>
</td>
</tr>`;
});

html+=`</table></div>`;
});

app.innerHTML=html;
}

/* AUTO LOGIN */
if(localStorage.getItem("user")){
currentUser=localStorage.getItem("user");
saved=loadData();
start();
}

</script>

</body>
</html>
